name: build WF
on:
  push:
    branches:
      - main
  
  pull_request:
    branches:
      - main

  workflow_dispatch:

  schedule:
    - cron: "10 14 * * 1-5" # after 14:10 every weekday

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Code checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Maven build
        run: mvn install

      - name: Upload build artifacts (WAR)
        uses: actions/upload-artifact@v4
        with:
          name: app-artifacts
          path: target/*.war

      - name: notify build fails
        if: failure()
        run: echo "build failed, check logs!"


  testing:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Code checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run test on main branch
        if: github.ref == 'refs/heads/main'
        run: mvn test

      - name: Checkstyle
        if: github.ref == 'refs/heads/main'
        run: mvn checkstyle:checkstyle
      - name: Run test on other branches
        if: github.ref != 'refs/heads/main'
        run: echo "skipping unit test and code analysis"

  security_scan:
    runs-on: ubuntu-latest
    steps:
      - name: Code checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run trivy security scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs #fs stands for filesystem
          scan-ref: .
          format: json
          exit-code: 0
          vuln-type: os,library
          output: trivy-results.json

      - name: Upload trivy scan results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-results
          path: trivy-results.json